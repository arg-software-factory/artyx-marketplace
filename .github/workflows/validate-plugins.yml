name: Validate plugins

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-plugins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/validate-plugins.mjs
