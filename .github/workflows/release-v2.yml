name: Publish Marketplace v2

on:
  push:
    tags:
      - "marketplace-v2-*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: npm run build:v2
      - name: Publish immutable catalog and plugin archives
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          marketplace.v2.json
          dist/v2/*.zip
          --verify-tag
          --title "Artyx Marketplace ${GITHUB_REF_NAME}"
          --notes "Verified Artyx plugin catalog and immutable versioned archives."
