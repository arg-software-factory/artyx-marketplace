name: Validate

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: npm run build:v2
      - uses: actions/upload-artifact@v4
        with:
          name: marketplace-v2-archives
          path: dist/v2/*.zip
          if-no-files-found: error
